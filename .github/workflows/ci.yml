name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync && uv pip install -e .

      - name: Lint
        run: uv run ruff check toy_agent/ main.py tests/

      - name: Format check
        run: uv run ruff format --check toy_agent/ main.py tests/

      - name: Test
        run: uv run pytest tests/ -q
